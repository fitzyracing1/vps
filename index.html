<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
      background:#0d1117;color:#e6edf3;min-height:100vh;
      display:flex;align-items:center;justify-content:center;padding:2rem}
.card{max-width:700px;width:100%;text-align:center}
.badge{display:inline-block;padding:.3rem 1rem;border-radius:20px;
        font-size:.8rem;font-weight:600;background:#58a6ff18;

h1{font-size:clamp(2rem,6vw,3.2rem);font-weight:800;letter-spacing:-1.5px;
    margin-bottom:.8rem;
    background:linear-gradient(135deg,#e6edf3 40%,#58a6ff);
    -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.bar{width:48px;height:3px;background:#58a6ff;border-radius:3px;
      margin:.8rem auto 1.8rem;opacity:.6}
p{font-size:1.05rem;color:#8b949e;line-height:1.75;
   max-width:500px;margin:0 auto 2.5rem}
.btns{display:flex;gap:.75rem;justify-content:center;flex-wrap:wrap}
a{display:inline-block;padding:.65rem 1.5rem;border-radius:8px;
   text-decoration:none;font-weight:500;font-size:.95rem;transition:all .15s}
.btn-p{background:#58a6ff;color:#0d1117;font-weight:600}
.btn-p:hover{opacity:.85;transform:translateY(-2px);box-shadow:0 4px 16px #58a6ff40}
.btn-s{background:transparent;color:#c9d1d9;border:1px solid #30363d}
.btn-s:hover{background:#161b22;transform:translateY(-2px)}
footer{margin-top:3rem;font-size:.78rem;color:#484f58}
footer a{color:#58a6ff;text-decoration:none}

  <div class="btns">
